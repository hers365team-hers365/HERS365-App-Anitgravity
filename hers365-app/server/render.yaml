services:
  - type: web
    name: hers365-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false # User needs to provide Supabase/Neon URL in dashboard
      - key: JWT_SECRET
        sync: false # User needs to provide JWT secret
      - key: STRIPE_SECRET_KEY
        sync: false # User needs to provide Stripe secret
      - key: OPENAI_API_KEY
        sync: false # User needs to provide OpenAI key
    autoDeploy: true
